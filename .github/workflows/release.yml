name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  build-and-publish:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pomo-devOMAR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # --generate-notes compares against the previous tag, so we need
          # the full history (and all tags) available.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check built artefacts
        run: |
          ls -l dist/
          test -n "$(ls dist/*.whl dist/*.tar.gz 2>/dev/null)"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.whl dist/*.tar.gz \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
